---
layout: default
---

<div class="container">
  <div class="page-title-box">
    <h1 class="page-title">{{ page.tag }}</h1>
  </div>

  {% assign tagged_posts = site.tags[page.tag] %}
  <div class="tag-list">
    {% for post in tagged_posts %}
      {% include article-content.html %}
    {% endfor %}
  </div>
</div>
